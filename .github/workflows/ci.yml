name: CI

on:
  pull_request:

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    # The eager db singleton reads DATABASE_URL at import. Tests never connect,
    # so a non-secret placeholder is enough; real creds live in Vercel.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint, test
        run: pnpm turbo run typecheck lint test
